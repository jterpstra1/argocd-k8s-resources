# ── GHCR Image Pull Secret ────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-vhco-secret
  namespace: stackweaver
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: ghcr-vhco-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "jterpstra1",
                "password": "{{ .ghcr_pat }}",
                "auth": "{{ printf "%s:%s" "jterpstra1" .ghcr_pat | b64enc }}"
              }
            }
          }
  data:
    - secretKey: ghcr_pat
      remoteRef:
        key: ghcr-vhco-secret
        property: password

