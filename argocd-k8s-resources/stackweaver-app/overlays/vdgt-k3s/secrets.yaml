---
# ── Zitadel Secret (seed) ────────────────────────────────────────────────────
# Bare Secret so that the ExternalSecret (creationPolicy: Merge) has something
# to merge into. ESO populates masterkey + admin-password; zitadel-init adds
# the remaining keys at runtime.
apiVersion: v1
kind: Secret
metadata:
  name: stackweaver-zitadel
  namespace: stackweaver
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
type: Opaque

---
# ── Zitadel Secret (ESO) ─────────────────────────────────────────────────────
# 1Password item: "stackweaver-zitadel"  →  fields: "masterkey", "admin-password"
#
# creationPolicy: Merge  — ESO only manages the two seed keys below.
# The remaining keys are written at runtime by the zitadel-init Job:
#   client-id, client-secret, login-service-user-token,
#   frontend-client-id, webhook-idp-sync-key, webhook-complement-token-key
#
# Using Merge ensures ESO will NOT overwrite those runtime keys on refresh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stackweaver-zitadel
  namespace: stackweaver
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: stackweaver-zitadel
    creationPolicy: Merge
  data:
    - secretKey: masterkey
      remoteRef:
        key: stackweaver-zitadel
        property: masterkey
    - secretKey: admin-password
      remoteRef:
        key: stackweaver-zitadel
        property: admin-password

