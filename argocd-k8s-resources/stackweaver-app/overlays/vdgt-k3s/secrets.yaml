---
# ── GitHub App Secret ─────────────────────────────────────────────────────────
# 1Password item: "stackweaver-github-app"  →  fields: "private-key", "webhook-secret"
#
# The template re-maps the PEM content into a "github-app.pem" key so that
# when the Secret is volume-mounted the file is named github-app.pem
# (identical result to: kubectl create secret generic … --from-file=github-app.pem)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stackweaver-github-app
  namespace: stackweaver
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword-cluster-store
    kind: ClusterSecretStore
  target:
    name: stackweaver-github-app
    creationPolicy: Owner
    template:
      data:
        private-key: "{{ .privateKey }}"
        github-app.pem: "{{ .privateKey }}"
        webhook-secret: "{{ .webhookSecret }}"
  data:
    - secretKey: privateKey
      remoteRef:
        key: stackweaver-github-app
        property: private-key
    - secretKey: webhookSecret
      remoteRef:
        key: stackweaver-github-app
        property: webhook-secret

